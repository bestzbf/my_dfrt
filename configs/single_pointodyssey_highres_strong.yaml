mode: mixture
datasets:
  - name: pointodyssey
    root: /data2/d4rt/datasets/PointOdyssey
    weight: 1.0
    adapter_kwargs:
      fast_root: /data1/zbf/PointOdyssey_fast
      require_tracks: true

clip_len: 48
img_size: 256
num_queries: 2048
use_augs: true
boundary_ratio: 0.3
t_tgt_eq_t_cam_ratio: 0.4
seed: 42

# Paper strongest / high-res setting:
# do not precompute resized patches; sample from highres crops at train time
precompute_patches: false
precompute_from_highres: false

index_cache_dir: /data1/zbf/my_dfrt/.index_cache
