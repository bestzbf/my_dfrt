mode: mixture
datasets:
  - name: dynamic_replica
    root: /data1/d4rt/datasets/Dynamic_Replica
    weight: 1.0
    val_split: valid
    adapter_kwargs:
      load_trajectories: true

clip_len: 48
img_size: 256
num_queries: 2048
use_augs: true
boundary_ratio: 0.3
t_tgt_eq_t_cam_ratio: 0.4
seed: 42

# Current branch uses precomputed resized patches (no transform_metadata/highres path).
precompute_patches: true
precompute_from_highres: false

index_cache_dir: /data1/zbf/my_dfrt/.index_cache
