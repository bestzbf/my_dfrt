# D4RT Mixture Training Config - Paper Strongest / High-Res Setting
#
# 这是论文 strongest setting 的推荐配置。
# 与 mixture_train.yaml 的区别：
#   precompute_patches: false   → 不预计算 patch，实时从原始分辨率 crop 采样
#   precompute_from_highres: false  → 无需预计算高分辨率 patch
#
# 启动命令（单机）：
#   python train_mixture.py \
#     --config configs/mixture_train_highres.yaml \
#     --patch-provider sampled_highres \
#     --output-dir outputs/mixture_highres
#
# 启动命令（多卡 DDP）：
#   torchrun --nproc_per_node=8 train_mixture.py \
#     --config configs/mixture_train_highres.yaml \
#     --patch-provider sampled_highres \
#     --output-dir outputs/mixture_highres
#
# 注意：
#   - 必须显式传 --patch-provider sampled_highres，默认 auto 不等于 high-res
#   - 相比默认配置训练速度慢约 10-20%（实时 crop 采样开销）
#   - 对 boundary / 小目标跟踪精度有明显提升（论文 Table 3 ablation）

mode: mixture
datasets:
  - name: pointodyssey
    root: /mnt/d/data/ZBF_Data/d4rt/PointOdyssey
    weight: 0.4
  - name: scannet
    root: /mnt/d/data/ZBF_Data/d4rt/ScanNet
    weight: 0.3
  - name: co3dv2
    root: /mnt/d/data/ZBF_Data/d4rt/Co3Dv2
    weight: 0.3
    adapter_kwargs:
      # 默认启用的 Co3Dv2 质量过滤，防止训练时忘记加
      # 1) 跟随 DUSt3R/CUT3R 风格，至少保留 viewpoint_quality_score 较高的序列
      min_viewpoint_quality: 0.5
      # 2) 再做一层几何可用性过滤：有效深度比例、前景占比
      min_valid_depth_ratio: 0.1
      min_foreground_ratio: 0.05
      quality_probe_frames: 3
      # 3) 序列必须真的有 pointcloud
      require_pointcloud: true

clip_len: 48
img_size: 256
num_queries: 2048
use_augs: true
boundary_ratio: 0.3
t_tgt_eq_t_cam_ratio: 0.4
seed: 42

# ---- patch provider 说明 ----
# precompute_patches: false  → 实时从 highres_video 原始 crop 分辨率采样 patch
#                              配合 --patch-provider sampled_highres 使用
#                              这是论文 strongest setting（boundary/小目标细节更好）
# precompute_patches: true   → 预计算 256×256 resized patches（mixture_train.yaml 默认）
#                              配合 --patch-provider auto 或 precomputed_resized 使用
#                              训练速度与默认相同，但 patch 分辨率受限
precompute_patches: false
precompute_from_highres: false
