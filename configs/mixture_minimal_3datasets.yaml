# 最小版配置（3个核心数据集）
# 适合快速实验和资源受限场景
mode: mixture
datasets:
  - name: pointodyssey
    root: /data2/d4rt/datasets/PointOdyssey
    weight: 0.5
    adapter_kwargs:
      fast_root: /data1/zbf/PointOdyssey_fast
      require_tracks: true  # Exclude 22 sequences with missing track annotations
  - name: kubric
    root: /data2/d4rt/datasets/kubric
    weight: 0.3
  - name: dynamic_replica
    root: /data1/d4rt/datasets/Dynamic_Replica
    weight: 0.2
    val_split: valid

clip_len: 48
img_size: 256
num_queries: 2048
use_augs: true
boundary_ratio: 0.3
t_tgt_eq_t_cam_ratio: 0.4
seed: 42
index_cache_dir: /data1/zbf/my_dfrt/.index_cache_min3_fast_v3
