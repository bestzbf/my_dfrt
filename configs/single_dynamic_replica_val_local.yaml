mode: mixture
datasets:
  - name: dynamic_replica
    root: /data5/d4rt_dataset/Dynamic_Replica
    weight: 1.0
    val_split: valid
    adapter_kwargs:
      load_trajectories: true
      skip_depth_when_tracks: true
      prefer_trajectory_npz: true
      io_workers: 4

clip_len: 48
img_size: 256
num_queries: 512
use_augs: false
boundary_ratio: 0.3
t_tgt_eq_t_cam_ratio: 0.4
seed: 42

allow_track_fallback: true
epoch_size: 2000
precompute_patches: false
precompute_from_highres: false
return_highres_video: false
store_video_uint8: false
store_auxiliary_tensors: true

index_cache_dir: /data/zbf/openclaw/d4rt/.index_cache_eval
