mode: mixture
datasets:
  - name: pointodyssey
    root: /data2/d4rt/datasets/PointOdyssey
    weight: 0.32
    adapter_kwargs:
      require_tracks: true
  - name: kubric
    root: /data/d4rt/kubric
    weight: 0.16
  - name: dynamic_replica
    root: /data1/d4rt/datasets/Dynamic_Replica
    weight: 0.12
    val_split: valid
  - name: co3dv2
    root: /data2/d4rt/datasets/Co3Dv2
    weight: 0.20
    adapter_kwargs:
      subset_name: fewview_train
      categories: null
      require_precomputed: false
      require_pointcloud: true
      sequence_denylist: /data/zbf/openclaw/d4rt/configs/co3dv2_denylist_degenerate_clips_20260422.txt
  - name: blendedmvs
    root: /data/d4rt/data/BlendedMVS
    weight: 0.20
    adapter_kwargs:
      use_masked: false

clip_len: 48
img_size: 256
num_queries: 2048
use_augs: true
boundary_ratio: 0.3
t_tgt_eq_t_cam_ratio: 0.4
seed: 42
allow_track_fallback: true

precompute_patches: false
precompute_from_highres: false

index_cache_dir: /data/zbf/openclaw/d4rt/.index_cache_5datasets_local
index_workers: 16
