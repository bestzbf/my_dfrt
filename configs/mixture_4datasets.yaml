mode: mixture
datasets:
  - name: pointodyssey
    root: /data2/d4rt/datasets/PointOdyssey
    weight: 0.4
    adapter_kwargs:
      fast_root: /data1/zbf/PointOdyssey_fast
      require_tracks: true
  - name: kubric
    root: /data2/d4rt/datasets/kubric
    weight: 0.2
  - name: dynamic_replica
    root: /data1/d4rt/datasets/Dynamic_Replica
    weight: 0.15
    val_split: valid
  - name: co3dv2
    root: /data2/d4rt/datasets/Co3Dv2
    weight: 0.25
    adapter_kwargs:
      subset_name: fewview_train
      categories: null
      require_precomputed: false
      require_pointcloud: true
    allow_track_fallback: true

clip_len: 48
img_size: 256
num_queries: 2048
use_augs: true
boundary_ratio: 0.3
t_tgt_eq_t_cam_ratio: 0.4
seed: 42
index_cache_dir: /data1/zbf/my_dfrt/.index_cache_4datasets
